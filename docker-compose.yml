services:
  postgres:
    image: postgis/postgis:15-3.4
    platform: linux/amd64
    container_name: allways_postgres
    environment:
      POSTGRES_USER: allways
      POSTGRES_PASSWORD: allways_dev
      POSTGRES_DB: allways_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U allways -d allways_db']
      interval: 10s
      timeout: 5s
      retries: 5

  osrm:
    image: osrm/osrm-backend:latest
    platform: linux/amd64
    container_name: allways_osrm
    ports:
      - '5000:5000'
    volumes:
      - ./osrm_data:/data
    command: osrm-routed --algorithm mld /data/ontario-latest.osrm
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:5000/nearest/v1/foot/0,0 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
